name: Deploy site

# Ships the landing site (site/) to Cloudflare. MANUAL-ONLY for now: run from
# the Actions tab ("Run workflow"). Auto-deploy on push to main is DISABLED
# until the repo secrets CLOUDFLARE_API_TOKEN (a token with Workers Scripts:Edit
# + the rmdv.mclee.dev zone's DNS edit) and CLOUDFLARE_ACCOUNT_ID are added.
# Re-enable by uncommenting the `push:` trigger below.
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'site/**'
  #     - 'wrangler.jsonc'
  #     - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler.jsonc static-assets config requires Wrangler >= 3.91.
          wranglerVersion: "4.112.0"
          command: deploy
