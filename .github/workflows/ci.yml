name: Linux CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libssl-dev pkg-config fuse libfuse2 file desktop-file-utils

      - name: Check formatting
        run: rustfmt --edition 2021 --check src/app.rs src/cli_install.rs

      - name: Run Linux tests
        run: cargo test --lib --tests --target x86_64-unknown-linux-gnu

      - name: Build Linux release binary
        run: |
          # The cargo cache can restore the binary without the PDFium runtime
          # library because liteparse's build-script output is not cached.
          # Rebuild that package so it refreshes the copy in target/*/deps.
          cargo clean -p liteparse-pdfium-sys --target x86_64-unknown-linux-gnu
          cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package AppImage
        env:
          TAG: ci-${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          BIN=target/x86_64-unknown-linux-gnu/release/rmdv
          APPDIR=rmdv.AppDir
          OUT="dist/rmdv-${TAG}-x86_64.AppImage"
          rm -rf "$APPDIR" dist squashfs-root appimagetool-x86_64.AppImage
          mkdir -p "$APPDIR/usr/bin" dist
          cp "$BIN" "$APPDIR/usr/bin/rmdv"

          # PDFium .so must sit next to the binary (dlopen searches current_exe
          # dir). liteparse's build script normally copies it into the build
          # tree, but its source cache is the authoritative fallback when that
          # best-effort copy is absent.
          PDFIUM_CACHE_ROOT="${XDG_CACHE_HOME:-$HOME/.cache}/pdfium-rs"
          SO=""
          if [ -d target/x86_64-unknown-linux-gnu/release ]; then
            SO=$(find target/x86_64-unknown-linux-gnu/release -name 'libpdfium.so' -type f -print -quit)
          fi
          if [ -z "$SO" ] && [ -d target ]; then
            SO=$(find target -name 'libpdfium.so' -type f -print -quit)
          fi
          if [ -z "$SO" ] && [ -d "$PDFIUM_CACHE_ROOT" ]; then
            SO=$(find "$PDFIUM_CACHE_ROOT" -name 'libpdfium.so' -type f -print -quit)
          fi
          if [ -z "$SO" ]; then
            echo "libpdfium.so not found; searched target/x86_64-unknown-linux-gnu/release, target, and $PDFIUM_CACHE_ROOT" >&2
            exit 1
          fi
          echo "Selected PDFium: $SO"
          cp "$SO" "$APPDIR/usr/bin/libpdfium.so"

          cp assets/icon.png "$APPDIR/rmdv.png"
          cat > "$APPDIR/rmdv.desktop" <<'DESKTOP'
          [Desktop Entry]
          Name=rmdv
          Exec=rmdv
          Icon=rmdv
          Type=Application
          Categories=Utility;
          DESKTOP
          cat > "$APPDIR/AppRun" <<'APPRUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/rmdv" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          echo "b90f4a8b18967545fda78a445b27680a1642f1ef9488ced28b65398f2be7add2  appimagetool-x86_64.AppImage" | sha256sum -c -
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract >/dev/null
          ARCH=x86_64 ./squashfs-root/AppRun "$APPDIR" "$OUT"
          chmod +x "$OUT"

      - name: Smoke-test AppImage CLI
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGE_PATH="dist/rmdv-ci-${GITHUB_SHA}-x86_64.AppImage"
          file "$APPIMAGE_PATH"
          "$APPIMAGE_PATH" --help >/tmp/rmdv-help.txt
          "$APPIMAGE_PATH" list-sections README.md >/tmp/rmdv-sections.json
          python3 -c 'import json; json.load(open("/tmp/rmdv-sections.json"))'

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-appimage
          path: dist/*.AppImage
          if-no-files-found: error
